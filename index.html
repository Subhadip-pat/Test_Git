<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Test Page v2</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, var(--bg));
      color: var(--text);
    }

    .card {
      width: min(560px, 92vw);
      background: var(--card);
      padding: 2rem;
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }

    p {
      margin: 0;
      line-height: 1.6;
    }

    .note {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #334155;
    }

    code {
      background: #eef2ff;
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>GitHub Test Successful - Updated</h1>
    <p>
      This page is in <code>index.html</code> and is ready to commit and push.
    </p>
    <p class="note">Second update prepared locally for your next push.</p>
  </main>
</body>
</html>
